name: Deploy to sfsb environment on push to main

on:
  push:
    branches: [ main ]
    paths:
      - 'force-app/**'
      - 'manifest/**'
  workflow_dispatch:
    inputs:
      destructive_mode:
        description: "When to apply destructive changes (none|pre|post)"
        required: false
        default: "post"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-to-sfsb-environment:
    runs-on: ubuntu-latest
    environment: SANDBOX

    permissions:
      contents: read

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
      # setup-node v6 exists and is current major line used widely. [2](https://github.com/actions/checkout)

      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
      # checkout v6 exists (Node 24 runtime support etc.). [3](https://stackoverflow.com/questions/77540396/how-to-use-gitub-actions-setup-node)

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install sfdx-git-delta
        run: |
          echo Y | sf plugins install sfdx-git-delta
          sf plugins
          sf version --verbose

      # ✅ Create delta + destructive artifacts
      # Use the correct source-dir root: force-app/main/default
      # SGD generates:
      #  - changed-sources/package/package.xml
      #  - changed-sources/destructiveChanges/destructiveChanges.xml
      #  - changed-sources/destructiveChanges/package.xml [1](https://releasealert.dev/github/actions/checkout)
      - name: Create delta packages
        run: |
          mkdir -p changed-sources

          sf sgd source delta \
            --to "HEAD" \
            --from "HEAD~1" \
            --output-dir "changed-sources" \
            --generate-delta \
            --source-dir "force-app/main/default"

          echo "===== Generated files (changed-sources) ====="
          find changed-sources -maxdepth 5 -type f -print

          echo "===== Delta manifest (changed-sources/package/package.xml) ====="
          cat changed-sources/package/package.xml || true

          echo "===== Destructive file (changed-sources/destructiveChanges/destructiveChanges.xml) ====="
          cat changed-sources/destructiveChanges/destructiveChanges.xml || true

      # JWT key (multiline safe)
      - name: Create JWT key file
        run: |
          printf "%s" "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Debug INSTANCE_URL
        run: |
          echo "SF_INSTANCE_URL='${{ vars.SF_INSTANCE_URL }}'"

      - name: Authenticate to Salesforce (JWT)
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USER_NAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --instance-url "${{ vars.SF_INSTANCE_URL }}" \
            --set-default

      - name: Debug org connection
        run: |
          sf org display --verbose

      # ✅ PRE destructive changes (OPTIONAL)
      # Uses SGD destructive output (single destructiveChanges.xml), but applies it before deploying delta. [1](https://releasealert.dev/github/actions/checkout)
      - name: Deploy DESTRUCTIVE changes (PRE) - safe skip
        run: |
          MODE="${{ github.event.inputs.destructive_mode || 'post' }}"
          echo "Destructive mode: $MODE"

          if [ "$MODE" != "pre" ]; then
            echo "Not in PRE mode. Skipping PRE destructive."
            exit 0
          fi

          DXML="changed-sources/destructiveChanges/destructiveChanges.xml"
          DPKG="changed-sources/destructiveChanges/package.xml"

          if [ ! -f "$DXML" ]; then
            echo "No destructiveChanges.xml found. Skipping PRE destructive."
            exit 0
          fi

          echo "Destructive changes file content:"
          cat "$DXML" || true

          # Skip if destructiveChanges.xml has no <types> (empty)
          if ! grep -q "<types>" "$DXML"; then
            echo "destructiveChanges.xml is empty (no <types>). Nothing to delete. Skipping PRE destructive."
            exit 0
          fi

          echo "Deploying destructive changes (PRE)..."
          sf project deploy start \
            --manifest "$DPKG" \
            --pre-destructive-changes "$DXML" \
            --test-level RunLocalTests \
            --wait 60

      # ✅ Deploy DELTA package (fields/classes/etc) ONLY if manifest has real content
      - name: Deploy DELTA package - safe skip if empty
        run: |
          PKG="changed-sources/package/package.xml"

          if [ ! -f "$PKG" ]; then
            echo "No delta manifest found ($PKG). Skipping delta deploy."
            exit 0
          fi

          echo "Delta manifest content:"
          cat "$PKG" || true

          # Skip if manifest has no <types> (empty)
          if ! grep -q "<types>" "$PKG"; then
            echo "Delta manifest is empty (no <types>). Nothing to deploy. Skipping."
            exit 0
          fi

          # Optional: fail early if SGD produced 'undefined.' members (bad path/structure)
          if grep -q "undefined\." "$PKG"; then
            echo "ERROR: package.xml contains 'undefined.' members. This indicates incorrect metadata folder structure."
            exit 1
          fi

          echo "Deploying delta manifest..."
          sf project deploy start \
            --manifest "$PKG" \
            --test-level RunLocalTests \
            --wait 60

      # ✅ POST destructive changes (OPTIONAL)
      # Applies the same SGD destructiveChanges.xml after delta deploy (default behavior). [1](https://releasealert.dev/github/actions/checkout)
      - name: Deploy DESTRUCTIVE changes (POST) - safe skip
        run: |
          MODE="${{ github.event.inputs.destructive_mode || 'post' }}"
          echo "Destructive mode: $MODE"

          if [ "$MODE" != "post" ]; then
            echo "Not in POST mode. Skipping POST destructive."
            exit 0
          fi

          DXML="changed-sources/destructiveChanges/destructiveChanges.xml"
          DPKG="changed-sources/destructiveChanges/package.xml"

          if [ ! -f "$DXML" ]; then
            echo "No destructiveChanges.xml found. Skipping POST destructive."
            exit 0
          fi

          echo "Destructive changes file content:"
          cat "$DXML" || true

          # Skip if destructiveChanges.xml has no <types> (empty)
          if ! grep -q "<types>" "$DXML"; then
            echo "destructiveChanges.xml is empty (no <types>). Nothing to delete. Skipping POST destructive."
            exit 0
          fi

          echo "Deploying destructive changes (POST)..."
          sf project deploy start \
            --manifest "$DPKG" \
            --post-destructive-changes "$DXML" \
            --test-level RunLocalTests \
            --wait 60

      - name: Clean up
        if: always()
        run: rm -f server.key