name: Deploy to sfsb environment on push to main

on:
  push:
    branches: [ main ]
    paths:
      - 'force-app/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-to-sfsb-environment:
    runs-on: ubuntu-latest
    environment: SANDBOX

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install sfdx-git-delta
        run: |
          echo Y | sf plugins install sfdx-git-delta
          sf plugins
          sf version --verbose
      # 5) Create delta folder (changed-sources)
      - name: Create delta packages
        run: |
          mkdir -p changed-sources
          sf sgd source delta \
            --to "HEAD" \
            --from "HEAD~1" \
            --output-dir "changed-sources" \
            --generate-delta \
            --source-dir "force-app"
          echo "[INFO] Diff generated"
          echo "----- Listing changed-sources -----"
          ls -la changed-sources || true
          echo "----- Find files under changed-sources -----"
          find changed-sources -maxdepth 6 -type f | sort || true
      # 6) Create JWT key file from GitHub secret
      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key
      # 7) Debug instance url (helps detect empty vars)
      - name: Debug INSTANCE_URL
        run: |
          echo "INSTANCE_URL='${{ vars.INSTANCE_URL }}'"
      # 8) Authenticate to Salesforce via JWT
      - name: Authenticate to Salesforce (JWT)
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USER_NAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --instance-url "${{ vars.SF_INSTANCE_URL }}" \
            --set-default
      # 9) OPTIONAL: show which org is default (debug)
      - name: Debug org connection
        run: |
          sf org display --verbose
      # 10) Deploy ONLY if delta exists (prevents "folder not found")
      - name: Deploy delta to Sandbox (Run Local Tests)
        if: ${{ hashFiles('changed-sources/force-app/**') != '' }}
        run: |
          echo "Delta found. Deploying changed-sources/force-app ..."
          sf project deploy start \
            --source-dir changed-sources/force-app \
            --test-level RunLocalTests \
            --wait 60
      # 11) If no delta exists, skip deploy gracefully
      - name: No delta changes - skipping deployment
        if: ${{ hashFiles('changed-sources/force-app/**') == '' }}
        run: |
          echo "No Salesforce delta detected in changed-sources/force-app. Skipping deployment."
      # 12) Cleanup always (important for security)
      - name: Clean up
        if: always()
        run: rm -f server.key