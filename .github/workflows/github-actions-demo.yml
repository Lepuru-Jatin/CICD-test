name: Deploy to sfsb environment on push to main

on:
  push:
    branches: [ main ]
    paths:
      - 'force-app/**'
      - 'manifest/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-to-sfsb-environment:
    runs-on: ubuntu-latest
    environment: SANDBOX

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install sfdx-git-delta
        run: |
          echo Y | sf plugins install sfdx-git-delta
          sf plugins
          sf version --verbose

      # 1) Generate delta package + destructiveChanges
      - name: Create delta packages
        run: |
          mkdir -p changed-sources
          sf sgd source delta \
            --to "HEAD" \
            --from "HEAD~1" \
            --output-dir "changed-sources" \
            --generate-delta \
            --source-dir "force-app"

          echo "----- Listing changed-sources -----"
          ls -la changed-sources || true

          echo "----- package.xml -----"
          if [ -f changed-sources/package/package.xml ]; then
            cat changed-sources/package/package.xml
          else
            echo "No package.xml generated"
          fi

          echo "----- destructiveChanges.xml -----"
          if [ -f changed-sources/destructiveChanges/destructiveChanges.xml ]; then
            cat changed-sources/destructiveChanges/destructiveChanges.xml
          else
            echo "No destructiveChanges.xml generated"
          fi
          
          echo "===== Git diff (what delta reads) ====="
          git diff --name-status HEAD~1 HEAD || true

      # 2) Split destructiveChanges into Pre/Post (YOU control what goes where)
      #    By default below: we copy the same destructive file into BOTH.
      #    Later you can adjust to pre-only or post-only.
      - name: Prepare pre/post destructive manifests (override with repo manifests if present)
        run: |
          mkdir -p changed-sources/destructiveChanges

          PRE_SRC="manifest/destructiveChanges/destructiveChangesPre.xml"
          POST_SRC="manifest/destructiveChanges/destructiveChangesPost.xml"

          PRE_DST="changed-sources/destructiveChanges/destructiveChangesPre.xml"
          POST_DST="changed-sources/destructiveChanges/destructiveChangesPost.xml"

          # Copy manual PRE if exists
          if [ -f "$PRE_SRC" ]; then
            cp "$PRE_SRC" "$PRE_DST"
            echo "✅ Copied MANUAL PRE destructive: $PRE_SRC -> $PRE_DST"
          else
            echo "ℹ️ No manual PRE file found at $PRE_SRC"
          fi

          # Copy manual POST if exists (this is your case)
          if [ -f "$POST_SRC" ]; then
            cp "$POST_SRC" "$POST_DST"
            echo "✅ Copied MANUAL POST destructive: $POST_SRC -> $POST_DST"
          else
            echo "ℹ️ No manual POST file found at $POST_SRC"
          fi

          echo "----- FINAL PRE destructive -----"
          [ -f "$PRE_DST" ] && cat "$PRE_DST" || echo "NO PRE FILE"

          echo "----- FINAL POST destructive -----"
          [ -f "$POST_DST" ] && cat "$POST_DST" || echo "NO POST FILE"
      # Create JWT key file from GitHub secret
      - name: Create JWT key file
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Debug INSTANCE_URL
        run: |
          echo "SF_INSTANCE_URL='${{ vars.SF_INSTANCE_URL }}'"

      # Authenticate to Salesforce via JWT
      - name: Authenticate to Salesforce (JWT)
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USER_NAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --instance-url "${{ vars.SF_INSTANCE_URL }}" \
            --set-default

      - name: Debug delta outputs
        run: |
          echo "===== LIST changed-sources ====="
          find changed-sources -maxdepth 4 -type f -print || true

          echo "===== DELTA package.xml ====="
          cat changed-sources/package/package.xml || echo "NO package.xml"

          echo "===== GENERATED destructiveChanges.xml ====="
          cat changed-sources/destructiveChanges/destructiveChanges.xml || echo "NO destructiveChanges.xml"

          echo "===== POST destructiveChangesPost.xml ====="
          cat changed-sources/destructiveChanges/destructiveChangesPost.xml || echo "NO destructiveChangesPost.xml"

          echo "=== After SGD, show POST file ==="
          ls -la changed-sources/destructiveChanges || true
          cat changed-sources/destructiveChanges/destructiveChangesPost.xml || true
      # 3) Deploy delta (adds/updates) + pre/post destructive (if present)
      - name: Deploy delta to Sandbox (manifest + pre/post destructive) - Run Local Tests
        if: ${{ hashFiles('changed-sources/package/package.xml') != '' || hashFiles('changed-sources/destructiveChanges/destructiveChangesPre.xml') != '' || hashFiles('changed-sources/destructiveChanges/destructiveChangesPost.xml') != '' }}
        run: |
          echo "Preparing deploy command..."

          CMD="sf project deploy start --wait 60 --test-level RunLocalTests"

          # If pre-destructive exists, include it
          if [ -f changed-sources/destructiveChanges/destructiveChangesPre.xml ]; then
            CMD="$CMD --pre-destructive-changes changed-sources/destructiveChanges/destructiveChangesPre.xml"
          fi

          # If package.xml exists, include it
          if [ -f changed-sources/package/package.xml ]; then
            CMD="$CMD --manifest changed-sources/package/package.xml"
          fi

          

          # If post-destructive exists, include it
          if [ -f changed-sources/destructiveChanges/destructiveChangesPost.xml ]; then
            CMD="$CMD --post-destructive-changes changed-sources/destructiveChanges/destructiveChangesPost.xml"
          fi

          echo "Running: $CMD"
          eval "$CMD"

      - name: No delta or destructive changes - skipping deployment
        if: ${{ hashFiles('changed-sources/package/package.xml') == '' && hashFiles('changed-sources/destructiveChanges/destructiveChangesPre.xml') == '' && hashFiles('changed-sources/destructiveChanges/destructiveChangesPost.xml') == '' }}
        run: |
          echo "No package.xml and no destructive changes found. Skipping deployment."

      - name: Clean up
        if: always()
        run: rm -f server.key