name: Deploy to sfsb environment on push to main

on:
  push:
    branches: [ main ]
    paths:
      - 'force-app/**'
      - 'manifest/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-to-sfsb-environment:
    runs-on: ubuntu-latest
    environment: SANDBOX

    # Recommended minimal permissions
    permissions:
      contents: read

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install sfdx-git-delta
        run: |
          echo Y | sf plugins install sfdx-git-delta
          sf plugins
          sf version --verbose

      # Create delta packages (SGD generates package/ and destructiveChanges/ folders)
      - name: Create delta packages
        run: |
          mkdir -p changed-sources

          sf sgd source delta \
            --to "HEAD" \
            --from "HEAD~1" \
            --output-dir "changed-sources" \
            --generate-delta \
            --source-dir "force-app"

          echo "===== Generated files (changed-sources) ====="
          find changed-sources -maxdepth 4 -type f -print

          echo "===== Delta manifest (changed-sources/package/package.xml) ====="
          cat changed-sources/package/package.xml || true

          echo "===== Destructive file (changed-sources/destructiveChanges/destructiveChanges.xml) ====="
          cat changed-sources/destructiveChanges/destructiveChanges.xml || true

      # Create JWT key file from GitHub secret (multiline-safe)
      - name: Create JWT key file
        run: |
          printf "%s" "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      - name: Debug INSTANCE_URL
        run: |
          echo "SF_INSTANCE_URL='${{ vars.SF_INSTANCE_URL }}'"

      - name: Authenticate to Salesforce (JWT)
        run: |
          sf org login jwt \
            --username "${{ secrets.SF_USER_NAME }}" \
            --jwt-key-file server.key \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --instance-url "${{ vars.SF_INSTANCE_URL }}" \
            --set-default

      - name: Debug org connection
        run: |
          sf org display --verbose

      # ✅ Deploy added/modified components (fields/classes/etc) ONLY if manifest has content
      - name: Deploy DELTA package (safe skip if empty)
        run: |
          PKG="changed-sources/package/package.xml"

          if [ ! -f "$PKG" ]; then
            echo "No delta manifest found ($PKG). Skipping delta deploy."
            exit 0
          fi

          echo "Delta manifest content:"
          cat "$PKG" || true

          # Skip if manifest has no <types> (empty)
          if ! grep -q "<types>" "$PKG"; then
            echo "Delta manifest is empty (no <types>). Nothing to deploy. Skipping."
            exit 0
          fi

          echo "Deploying delta manifest..."
          sf project deploy start \
            --manifest "$PKG" \
            --test-level RunLocalTests \
            --wait 60

      # ✅ Deploy destructive changes ONLY if destructiveChanges.xml exists and has content
      # SGD outputs: changed-sources/destructiveChanges/destructiveChanges.xml [1](https://www.npmjs.com/package/sfdx-git-delta)
      - name: Deploy DESTRUCTIVE changes (POST) (safe skip if empty)
        run: |
          DXML="changed-sources/destructiveChanges/destructiveChanges.xml"
          DPKG="changed-sources/destructiveChanges/package.xml"

          if [ ! -f "$DXML" ]; then
            echo "No destructiveChanges.xml found. Skipping destructive deploy."
            exit 0
          fi

          echo "Destructive changes file content:"
          cat "$DXML" || true

          # Skip if destructiveChanges.xml has no <types> (empty)
          if ! grep -q "<types>" "$DXML"; then
            echo "destructiveChanges.xml is empty (no <types>). Nothing to delete. Skipping."
            exit 0
          fi

          echo "Deploying destructive changes (POST)..."
          sf project deploy start \
            --manifest "$DPKG" \
            --post-destructive-changes "$DXML" \
            --test-level RunLocalTests \
            --wait 60

      # Cleanup always
      - name: Clean up
        if: always()
        run: rm -f server.key