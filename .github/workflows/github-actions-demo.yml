name: Deploy to Salesforce

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Show Salesforce CLI version
        run: sf version --verbose

      - name: Check required secrets exist
        shell: bash
        run: |
          if [ -z "${{ secrets.SF_CONSUMER_KEY }}" ]; then
            echo "Missing secret: SF_CONSUMER_KEY"
            exit 1
          fi
          if [ -z "${{ secrets.SF_USER_NAME }}" ]; then
            echo "Missing secret: SF_USER_NAME"
            exit 1
          fi
          if [ -z "${{ secrets.SF_INSTANCE_URL }}" ]; then
            echo "Missing secret: SF_INSTANCE_URL"
            exit 1
          fi
          if [ -z "${{ secrets.SF_JWT_KEY }}" ]; then
            echo "Missing secret: SF_JWT_KEY"
            exit 1
          fi
          echo "All required secrets are present."

      - name: Create JWT key file
        shell: bash
        run: |
          cat <<'EOF' > server.key
          ${{ secrets.SF_JWT_KEY }}
          EOF
          chmod 600 server.key
          ls -l server.key

      - name: Authenticate to Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USER_NAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias target-org \
            --json

      - name: Check authenticated org
        run: sf org display --target-org target-org --verbose

      - name: Validate deployment
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org target-org \
            --dry-run \
            --wait 30 \
            --json

      - name: Deploy to Salesforce
        run: |
          sf project deploy start \
            --source-dir force-app \
            --target-org target-org \
            --wait 30 \
            --json